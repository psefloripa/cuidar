<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cuidar, Proteger e Conviver</title>
    <meta name="description" content="Curso Educativo para Adolescentes - Programa Saúde na Escola de Florianópolis">

    <!-- Ícone da aba (opcional: troque pela URL de um favicon institucional, se desejar) -->
    <link rel="icon" type="image/png" href="https://i.imgur.com/cdlakCV.png">

    <style>
        /*
         * ESTRATÉGIA:
         * O Google injeta uma barra de aviso no TOPO da Web App (~38px de altura).
         * Como não é possível removê-la de dentro do app, esta página "casca"
         * embute a Web App num iframe e desloca esse iframe para CIMA, de modo que
         * a barra fique acima da área visível. A altura do iframe é aumentada na
         * mesma medida para que o rodapé do app não fique cortado embaixo.
         */

        :root {
            /* Altura da barra de aviso do Google. Se algum dia ela mudar de
               tamanho, ajuste APENAS este valor. */
            --barra-google: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #4c1d95; /* roxo do app, evita "flash" branco ao carregar */
        }

        /* Container que ocupa exatamente a tela visível.
           Usa 100dvh (dynamic viewport height): no celular, acompanha o
           aparecer/sumir da barra do navegador e do teclado, evitando o
           bug clássico do 100vh que deixa um vão embaixo. */
        #wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;        /* fallback para navegadores antigos */
            height: 100dvh;       /* moderno: acompanha o viewport real */
            overflow: hidden;
        }

        /* O iframe é maior que a tela: ele "sobe" para esconder a barra do
           Google (top negativo) e ganha altura extra para compensar, de modo
           que o conteúdo do app continue inteiro. */
        #app-frame {
            position: absolute;
            top: calc(var(--barra-google) * -1);  /* empurra a barra para fora */
            left: 0;
            width: 100%;
            height: calc(100% + var(--barra-google));
            border: none;
            display: block;
        }

        /* Tela de carregamento exibida enquanto o app dentro do iframe inicia.
           Some sozinha quando o iframe termina de carregar. */
        #loading {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            background: linear-gradient(135deg, #4c1d95 0%, #0f766e 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: opacity 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 56px;
            height: 56px;
            border: 5px solid rgba(255, 255, 255, 0.25);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading p {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            opacity: 0.95;
            text-align: center;
            padding: 0 24px;
        }
    </style>
</head>
<body>
    <!-- Tela de carregamento (desaparece quando o iframe carrega) -->
    <div id="loading">
        <div class="spinner"></div>
        <p>Carregando o curso...</p>
    </div>

    <!-- Container da tela cheia -->
    <div id="wrapper">
        <!--
            IMPORTANTE: o atributo src abaixo deve apontar para a SUA Web App.
            Esta é a URL terminada em /exec que aparece ao implantar.
        -->
        <iframe
            id="app-frame"
            src="https://script.google.com/a/macros/espfloripa.com/s/AKfycbwfu-6dDzNP-vZukihW5WfQJfi83OIYiae-Qcxhj8oZ6PhwTTJ4vs8-zK2Blge9EsoM/exec"
            title="Cuidar, Proteger e Conviver"
            allow="fullscreen; clipboard-write"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Esconde a tela de carregamento assim que o iframe terminar de carregar.
        var frame = document.getElementById('app-frame');
        var loading = document.getElementById('loading');

        frame.addEventListener('load', function () {
            // pequeno atraso para o React renderizar a primeira tela
            setTimeout(function () {
                loading.classList.add('hidden');
            }, 600);
        });

        // Rede de segurança: se por algum motivo o evento 'load' não disparar
        // (acontece às vezes com conteúdo de origem cruzada), esconde mesmo assim
        // após 6 segundos para não deixar o aluno preso na tela de carregamento.
        setTimeout(function () {
            loading.classList.add('hidden');
        }, 6000);
    </script>
</body>
</html>
